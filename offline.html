<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Brak połączenia — Moje Sprzątania</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0F3F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      border: 0.5px solid #ddd;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
    p  { font-size: 14px; color: #777; line-height: 1.6; margin-bottom: 24px; }
    button {
      width: 100%;
      padding: 14px;
      background: #2980B9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>Brak połączenia</h1>
    <p>Aplikacja potrzebuje internetu żeby pobrać Twoje zadania.<br>Sprawdź połączenie i spróbuj ponownie.</p>
    <button onclick="window.location.reload()">🔄 Spróbuj ponownie</button>
  </div>
</body>
</html>
