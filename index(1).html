<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Moje Sprzątania</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- iOS: traktuj jako apkę -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sprzątania">

  <!-- Android theme color -->
  <meta name="theme-color" content="#2980B9">

  <!-- iOS ikony (fallback gdy brak PNG — używa emoji splash) -->
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #F0F3F7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    /* ── Splash screen (pokazuje się zanim załaduje iframe) ── */
    #splash {
      position: fixed; inset: 0;
      background: #2980B9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .logo { font-size: 64px; margin-bottom: 16px; }
    #splash h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }
    #splash p {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
    }
    #splash .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Główny iframe ── */
    #appFrame {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #F0F3F7;
    }

    /* ── Baner "Dodaj do ekranu" (Android Chrome) ── */
    #installBanner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 0.5px solid #ddd;
      padding: 14px 16px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    #installBanner.show { display: flex; align-items: center; gap: 12px; }
    #installBanner .ib-icon { font-size: 32px; flex-shrink: 0; }
    #installBanner .ib-text { flex: 1; }
    #installBanner .ib-text strong { font-size: 14px; color: #1a1a1a; display: block; }
    #installBanner .ib-text span  { font-size: 12px; color: #888; }
    #installBanner .ib-btn {
      padding: 9px 16px;
      background: #2980B9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    #installBanner .ib-close {
      padding: 6px;
      background: none;
      border: none;
      font-size: 18px;
      color: #aaa;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── iOS instrukcja "Dodaj do ekranu" ── */
    #iosBanner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 0.5px solid #ddd;
      padding: 16px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    #iosBanner.show { display: block; }
    #iosBanner .ios-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #iosBanner .ios-title button {
      background: none;
      border: none;
      font-size: 20px;
      color: #aaa;
      cursor: pointer;
      padding: 0;
    }
    #iosBanner .ios-steps {
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }
    #iosBanner .ios-steps span {
      background: #F4F6F8;
      border-radius: 6px;
      padding: 1px 7px;
      font-weight: 500;
    }
    /* Trójkąt wskazujący na przycisk Share */
    #iosBanner::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 10px solid transparent;
      border-top-color: #fff;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="logo">🧹</div>
    <h1>Moje Sprzątania</h1>
    <p>Ładowanie zadań...</p>
    <div class="spinner"></div>
  </div>

  <!-- Główna aplikacja w iframe -->
  <!--
    ⚠️  WAŻNE: Zamień poniższy URL na swój adres Google Apps Script Web App!
    Skopiuj go z: Rozszerzenia → Apps Script → Wdróż → Zarządzaj wdrożeniami
  -->
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwFOSO8N-gINgkNh56K_5nfJNlEJXik_z5N5bXRvVKA2XPfg1qUrPR34cM83jW7D2Rq/exec"
    allow="accelerometer; camera; microphone"
    loading="eager"
  ></iframe>

  <!-- Baner instalacji Android -->
  <div id="installBanner">
    <div class="ib-icon">🧹</div>
    <div class="ib-text">
      <strong>Dodaj do ekranu głównego</strong>
      <span>Używaj jak zwykłej aplikacji</span>
    </div>
    <button class="ib-btn" id="installBtn">Dodaj</button>
    <button class="ib-close" id="installClose">✕</button>
  </div>

  <!-- Baner instalacji iOS -->
  <div id="iosBanner">
    <div class="ios-title">
      <span>📲 Dodaj do ekranu głównego</span>
      <button id="iosClose">✕</button>
    </div>
    <div class="ios-steps">
      1. Naciśnij przycisk <span>Udostępnij</span> (⬆️ na dole ekranu)<br>
      2. Wybierz <span>Dodaj do ekranu głównego</span><br>
      3. Naciśnij <span>Dodaj</span> w prawym górnym rogu
    </div>
  </div>

  <script>
    // ── Service Worker ────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(function(reg) {
          console.log('SW zarejestrowany:', reg.scope);
        })
        .catch(function(err) {
          console.warn('SW błąd:', err);
        });
    }

    // ── Ukryj splash po załadowaniu iframe ───────────────────
    var frame  = document.getElementById('appFrame');
    var splash = document.getElementById('splash');

    frame.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('hide');
        setTimeout(function() {
          splash.style.display = 'none';
        }, 450);
      }, 300);
    });

    // Timeout bezpieczeństwa — schowaj splash po 6s nawet jeśli iframe się nie załadował
    setTimeout(function() {
      splash.classList.add('hide');
    }, 6000);

    // ── Android: przechwytaj prompt "Dodaj do ekranu" ────────
    var deferredPrompt = null;
    var installBanner  = document.getElementById('installBanner');
    var installBtn     = document.getElementById('installBtn');
    var installClose   = document.getElementById('installClose');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      // Pokaż baner tylko jeśli jeszcze nie zainstalowane
      if (!window.matchMedia('(display-mode: standalone)').matches) {
        installBanner.classList.add('show');
      }
    });

    installBtn.addEventListener('click', function() {
      installBanner.classList.remove('show');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
          deferredPrompt = null;
        });
      }
    });

    installClose.addEventListener('click', function() {
      installBanner.classList.remove('show');
    });

    // ── iOS: pokaż instrukcję jeśli Safari i nie standalone ──
    var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
                          || window.navigator.standalone;

    if (isIos && !isInStandaloneMode) {
      // Pokaż po 2 sekundach żeby nie przeszkadzać przy starcie
      setTimeout(function() {
        document.getElementById('iosBanner').classList.add('show');
      }, 2000);
    }

    document.getElementById('iosClose').addEventListener('click', function() {
      document.getElementById('iosBanner').classList.remove('show');
    });
  </script>
</body>
</html>
