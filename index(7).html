function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):{};}catch(e){return{};}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsSaveDone(row,val){var d=lsGet(LS_DONE);if(val===null)delete d[row];else d[row]=val;lsSet(LS_DONE,d);}
function lsSaveUsterki(row,u){var m=lsGet(LS_USTERKI);if(!u||!u.length)delete m[row];else m[row]=u;lsSet(LS_USTERKI,m);}
function lsSaveChecklist(row,data){var c=lsGet(LS_CHECKLIST);if(!data||!Object.keys(data).length)delete c[row];else c[row]=data;lsSet(LS_CHECKLIST,c);}

function mergeLocalState(){
  var dM=lsGet(LS_DONE),uM=lsGet(LS_USTERKI),cM=lsGet(LS_CHECKLIST);
  state.allJobs.forEach(function(j){
    var k=String(j.row);
    if(k in dM)j.done=dM[k];
    // Usterki: use server data if server has any, otherwise use local cache
    // This prevents stale local usterki appearing on wrong jobs after row shifts
    if(k in uM){
      if(!j.usterki||j.usterki.length===0){
        j.usterki=uM[k];
      } else {
        // Merge: add local-only entries (id starts with 'loc-') not yet on server
        var serverIds=j.usterki.map(function(u){return u.id;});
        var localOnly=(uM[k]||[]).filter(function(u){return u.id.indexOf('loc-')===0&&serverIds.indexOf(u.id)<0;});
        j.usterki=j.usterki.concat(localOnly);
      }
    }
    if(k in cM)j.checklist=cM[k];
  });
  // Clean up localStorage usterki for rows that no longer exist
  var validRows=state.allJobs.map(function(j){return String(j.row);});
  var uAll=lsGet(LS_USTERKI);
  var changed=false;
  Object.keys(uAll).forEach(function(k){if(validRows.indexOf(k)<0){delete uAll[k];changed=true;}});
  if(changed)lsSet(LS_USTERKI,uAll);
}

function apiGet(params,cb){
  var url=API+'?'+params+'&_='+Date.now();
  fetch(url,{cache:'no-store'}).then(function(r){return r.text();}).then(function(text){
    var data;try{data=JSON.parse(text);}catch(e){var m=text.match(/^[^(]+\((.+)\)$/s);if(m)data=JSON.parse(m[1]);else throw e;}
    cb(null,data);
  }).catch(function(){
    var n='cb_'+Date.now(),s=document.createElement('script'),done=false;
    window[n]=function(data){done=true;delete window[n];try{document.body.removeChild(s);}catch(e){}cb(null,data);};
    s.onerror=function(){if(done)return;done=true;delete window[n];cb(new Error('err'),null);};
    s.src=API+'?'+params+'&callback='+n+'&_='+Date.now();
    document.body.appendChild(s);
  });
}
function apiAction(params){
  fetch(API+'?'+params+'&_='+Date.now(),{cache:'no-store'}).catch(function(){});
}

function loadData(cb){
  var attempts=0;
  function attempt(){
    attempts++;
    apiGet('action=spa_data',function(err,data){
      if(err){if(attempts<3)setTimeout(attempt,1000);return;}
      try{
        state.workers=data.workers||[];
        state.allJobs=(data.jobs||[]).map(function(j){j.date=new Date(j.dateTs);return j;});
        state.preSeason=data.preSeason||[];
        state.properties=data.properties||[];
        state.laundry=data.laundry||[];
        state.loaded=true;
        mergeLocalState();
        if(cb)cb();
      }catch(e){if(attempts<3)setTimeout(attempt,1000);}
    });
  }
  attempt();
}

function uploadPropPhoto(idx,input,isVideo){
  if(!input.files||!input.files.length)return;
  var p=state.properties[idx];if(!p)return;
  var files=Array.from(input.files);
  toast((isVideo?'üé• Wysy≈Çanie...':'üì∏ Wysy≈Çanie...')+(files.length>1?' ('+files.length+' plik√≥w)':''),8000);
  files.forEach(function(file){
    if(isVideo&&file.size>MAX_FILE_SIZE){alert('Filmik "'+file.name+'" jest za d≈Çugi ‚Äî maksymalnie 15 sekund.');return;}
    (function(f){
      function doUpload(){
        var desc=files.length===1?prompt((isVideo?'Tytu≈Ç filmiku':'Tytu≈Ç/opis zdjƒôcia')+' (opcjonalnie):','')||'':'';
        var reader=new FileReader();
        reader.onload=function(e){
          var base64=e.target.result.split(',')[1];
          var ext=isVideo?'.mp4':'.jpg';
          var mime=isVideo?f.type:'image/jpeg';
          fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:'action=prop_photo_add&prow='+encodeURIComponent(p.sheetRow)
              +'&filename='+encodeURIComponent('prop_'+p.sheetRow+'_'+Date.now()+ext)
              +'&desc='+encodeURIComponent(desc)+'&mimetype='+encodeURIComponent(mime)
              +'&photo='+encodeURIComponent(base64),cache:'no-store'})
            .then(function(r){return r.json();}).then(function(data){
              if(data.ok){
                if(!p.zdjecia)p.zdjecia=[];
                p.zdjecia.push({id:'loc-'+Date.now(),ts:nowTs(),url:data.url,desc:desc,isVideo:isVideo});
                renderPropertyDetail(idx);
                toast(isVideo?'‚úÖ Filmik zapisany':'‚úÖ Zdjƒôcie zapisane');
              } else {toast('‚ùå B≈ÇƒÖd wysy≈Çania');}
            }).catch(function(){toast('‚ùå B≈ÇƒÖd po≈ÇƒÖczenia');});
        };
        reader.readAsDataURL(f);
      }
      if(isVideo){checkVideoDuration(f,function(dur){if(dur>15.5){alert('Filmik jest za d≈Çugi ('+Math.round(dur)+' sek) ‚Äî maksymalnie 15 sekund.');}else{doUpload();}});}
      else{doUpload();}
    })(file);
  });
  input.value='';
}

function addLaundry(){

function uploadLaundryPhoto(lrow,input,isVideo){
  if(!input.files||!input.files.length)return;
  var files=Array.from(input.files);
  toast((isVideo?'üé• Wysy≈Çanie...':'üì∏ Wysy≈Çanie...')+(files.length>1?' ('+files.length+' plik√≥w)':''),8000);
  files.forEach(function(file){
    if(isVideo&&file.size>MAX_FILE_SIZE){alert('Filmik "'+file.name+'" jest za d≈Çugi ‚Äî maksymalnie 15 sekund.');return;}
    (function(f){
      function doUpload(){
        var desc=files.length===1?prompt((isVideo?'Tytu≈Ç filmiku':'Opis zdjƒôcia')+' (opcjonalnie):','')||'':'';
        var reader=new FileReader();
        reader.onload=function(e){
          var base64=e.target.result.split(',')[1];
          var ext=isVideo?'.mp4':'.jpg';
          var mime=isVideo?f.type:'image/jpeg';
          fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:'action=laundry_photo_add&lrow='+encodeURIComponent(lrow)
              +'&filename='+encodeURIComponent('laundry_'+lrow+'_'+Date.now()+ext)
              +'&desc='+encodeURIComponent(desc)+'&mimetype='+encodeURIComponent(mime)
              +'&photo='+encodeURIComponent(base64),cache:'no-store'})
            .then(function(r){return r.json();}).then(function(data){
              if(data.ok){
                var entry=state.laundry.find(function(l){return String(l.lrow)===String(lrow);});
                if(entry){if(!entry.photos)entry.photos=[];entry.photos.push({id:'loc-'+Date.now(),ts:nowTs(),url:data.url,desc:desc,isVideo:isVideo});}
                toast(isVideo?'‚úÖ Filmik zapisany':'‚úÖ Zdjƒôcie zapisane');showLaundry();
              } else {toast('‚ùå B≈ÇƒÖd wysy≈Çania');}
            }).catch(function(){toast('‚ùå B≈ÇƒÖd po≈ÇƒÖczenia');});
        };
        reader.readAsDataURL(f);
      }
      if(isVideo){checkVideoDuration(f,function(dur){if(dur>15.5){alert('Filmik jest za d≈Çugi ('+Math.round(dur)+' sek) ‚Äî maksymalnie 15 sekund.');}else{doUpload();}});}
      else{doUpload();}
    })(file);
  });
  input.value='';
}

// ‚îÄ‚îÄ Timer ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
var _jobTimers={};
function timerStart(row){
  if(_jobTimers[row]&&_jobTimers[row].running)return;
  var startTime=Date.now();
  _jobTimers[row]={running:true,startTime:startTime,interval:null};
  var btn=document.getElementById('tbtn-'+row);
  if(btn)btn.outerHTML='<button class="timer-btn-stop" id="tbtn-'+row+'" onclick="timerStop('+row+')">‚èπ Ko≈Ñczƒô sprzƒÖtanie</button>';
  _jobTimers[row].interval=setInterval(function(){
    var elapsed=Math.floor((Date.now()-startTime)/1000);
    var h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
    var disp=document.getElementById('tdisp-'+row);
    if(disp)disp.textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  },1000);
}
function timerStop(row){
  if(!_jobTimers[row]||!_jobTimers[row].running)return;
  clearInterval(_jobTimers[row].interval);_jobTimers[row].running=false;
  var elapsed=Math.floor((Date.now()-_jobTimers[row].startTime)/1000);
  var h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
  var timeStr=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  var btn=document.getElementById('tbtn-'+row);
  if(btn)btn.outerHTML='<button class="timer-btn-start" id="tbtn-'+row+'" onclick="timerStart('+row+')">‚ñ∂ Zaczynam sprzƒÖtanie</button>';
  var res=document.getElementById('tres-'+row);
  if(res)res.textContent='‚úì Czas sprzƒÖtania: '+timeStr;
  toast('‚è±Ô∏è Czas: '+timeStr);
}

function uploadPhoto(row,input,isVideo){
  if(!input.files||!input.files.length)return;

  for(var fi=0;fi<files.length;fi++){
    var file=files[fi];
    if(isVideo&&file.size>MAX_FILE_SIZE){alert('Filmik "'+file.name+'" jest za d≈Çugi ‚Äî maksymalnie 15 sekund.');continue;}
    (function(f){
      function doUpload(){
        var desc=files.length===1?prompt((isVideo?'Tytu≈Ç filmiku':'Tytu≈Ç/opis zdjƒôcia')+' (opcjonalnie):','')||'':'';
        toast((isVideo?'üé• Wysy≈Çanie...':'üì∏ Wysy≈Çanie...')+(files.length>1?' ('+files.length+' plik√≥w)':''),8000);
        var reader=new FileReader();
        reader.onload=function(e){
          var base64=e.target.result.split(',')[1];

            body:'action=photo_upload&row='+encodeURIComponent(row)+'&worker='+encodeURIComponent(state.currentWorker||'')
              +'&filename='+encodeURIComponent('usterka_'+row+'_'+Date.now()+ext)
              +'&desc='+encodeURIComponent(desc)+'&mimetype='+encodeURIComponent(f.type)
              +'&photo='+encodeURIComponent(base64),cache:'no-store'})
            .then(function(r){return r.json();}).then(function(data){
              if(data.ok){
                var job=state.allJobs.find(function(j){return j.row===row;});
                if(job){
                  if(!job.usterki)job.usterki=[];
                  var label=isVideo?(desc?'üé• '+desc:'üé• [FILMIK]'):(desc?'üì∏ '+desc:'üì∏ [ZDJƒòCIE]');
                  job.usterki.push({id:'loc-'+Date.now(),ts:nowTs(),text:label,photo:data.url,isVideo:isVideo});
                  lsSaveUsterki(row,job.usterki);renderU(row,job.usterki);
                }
                toast(isVideo?'‚úÖ Filmik zapisany':'‚úÖ Zdjƒôcie zapisane');
              } else {toast('‚ùå B≈ÇƒÖd wysy≈Çania',4000);}
            }).catch(function(){toast('‚ùå B≈ÇƒÖd po≈ÇƒÖczenia');});
        };
        reader.readAsDataURL(f);
      }
      if(isVideo){checkVideoDuration(f,function(dur){if(dur>15.5){alert('Filmik jest za d≈Çugi ('+Math.round(dur)+' sek) ‚Äî maksymalnie 15 sekund.');}else{doUpload();}});}
      else{doUpload();}
    })(file);
  }
  input.value='';
}
