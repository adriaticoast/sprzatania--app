<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Moje Sprzątania</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sprzątania">
  <meta name="theme-color" content="#2980B9">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #F0F3F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
    #splash {
      position: fixed; inset: 0; background: #2980B9;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .logo { font-size: 64px; margin-bottom: 16px; }
    #splash h1 { font-size: 22px; font-weight: 600; color: #fff; }
    #splash p  { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 6px; }
    #splash .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #appFrame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; background: #F0F3F7; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">🧹</div>
    <h1>Moje Sprzątania</h1>
    <p>Ładowanie zadań...</p>
    <div class="spinner"></div>
  </div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwFOSO8N-gINgkNh56K_5nfJNlEJXik_z5N5bXRvVKA2XPfg1qUrPR34cM83jW7D2Rq/exec"
    loading="eager"
  ></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
    var frame = document.getElementById('appFrame');
    var splash = document.getElementById('splash');
    frame.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('hide');
        setTimeout(function() { splash.style.display = 'none'; }, 450);
      }, 300);
    });
    setTimeout(function() { splash.classList.add('hide'); }, 6000);
  </script>
</body>
</html>
