<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Moje Sprzątania</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sprzątania">
<meta name="theme-color" content="#2980B9">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F0F3F7;color:#1a1a1a;}
.screen{display:none;}
.screen.active{display:block;}
.w{max-width:500px;margin:0 auto;padding:16px 14px 80px;}
.header{background:#2980B9;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.header-back{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-size:17px;font-weight:500;color:#fff;flex:1;}
.header-sub{font-size:11px;color:rgba(255,255,255,0.7);}
.login-hero{text-align:center;padding:32px 0 24px;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-title{font-size:22px;font-weight:500;color:#1a1a1a;}
.login-sub{font-size:13px;color:#888;margin-top:4px;}
.worker-list{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.worker-btn{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px 16px;font-size:15px;font-weight:500;color:#1a1a1a;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;}
.worker-btn:active{background:#EBF5FB;transform:scale(0.98);}
.worker-avatar{width:38px;height:38px;border-radius:50%;background:#2980B9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.cal-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#fff;border:0.5px solid #ddd;border-radius:10px;font-size:14px;font-weight:500;color:#2471A3;cursor:pointer;margin-bottom:10px;width:100%;}
.cal-btn-report{color:#6C3483;border-color:#C39BD3;}
.cal-btn-props{color:#1E8449;border-color:#82E0AA;}
.sec-today{font-size:14px;font-weight:500;color:#C0392B;margin:0 0 12px 0;padding-bottom:8px;border-bottom:2px solid #E74C3C;}
.sec-upcoming{font-size:13px;font-weight:500;color:#888;margin:18px 0 12px 0;padding-bottom:6px;border-bottom:0.5px solid #eee;}
.no-jobs{background:#EBF5FB;border-radius:10px;padding:20px;text-align:center;color:#666;margin-bottom:16px;font-size:14px;}
.card{background:#fff;border:0.5px solid #ddd;border-radius:14px;padding:16px;margin-bottom:14px;}
.card.done{opacity:0.55;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-prop{font-size:17px;font-weight:500;color:#1a1a1a;}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.badge-CRITICAL{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;}
.badge-URGENT{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27;}
.badge-FLEXIBLE{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.card-cell{background:#F4F6F8;border-radius:8px;padding:9px 11px;}
.card-cell-no-time{background:#FEF5E7;border:0.5px solid #F0A500;}
.card-cell-time-late{color:#E67E22 !important;}
.card-cell-label{font-size:10px;font-weight:500;color:#888;letter-spacing:0.3px;margin-bottom:3px;}
.card-cell-val{font-size:12px;color:#333;line-height:1.4;}
.card-cell-time{font-size:16px;font-weight:500;color:#2471A3;margin-top:3px;}
.extras-label{font-size:10px;font-weight:500;color:#7D4900;letter-spacing:0.4px;margin:10px 0 6px 0;}
.extras-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px;}
.extra-item{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;}
.extra-std{background:#FAEEDA;color:#7D4900;border:0.5px solid #EF9F27;}
.extra-custom{background:#F4ECF7;color:#6C3483;border:0.5px solid #C39BD3;}
.no-extras{margin:10px 0;background:#F4F6F8;border-radius:6px;padding:7px 10px;font-size:12px;color:#888;}
.notes-box{margin-top:8px;padding:8px 10px;background:#EBF5FB;border-left:3px solid #3498DB;border-radius:0 6px 6px 0;font-size:12px;color:#444;}
.cl-toggle{width:100%;padding:10px 14px;background:#F4F6F8;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;color:#222;margin-top:14px;}
.cl-body{display:none;margin-top:8px;}
.cl-body.open{display:block;}
.cl-section-title{font-size:13px;font-weight:500;color:#333;padding:8px 0 5px 0;border-top:0.5px solid #eee;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:0.5px solid #eee;cursor:pointer;}
.cl-item input{width:17px;height:17px;margin-top:2px;flex-shrink:0;accent-color:#27AE60;}
.cl-item span{font-size:13px;line-height:1.5;}
.cl-item.checked span{text-decoration:line-through;opacity:0.4;}
.cl-warn{color:#7D4900;font-weight:500;}
.cl-progress-bar{height:5px;background:#E0E0E0;border-radius:3px;margin-top:10px;}
.cl-progress-fill{height:5px;background:#27AE60;border-radius:3px;transition:width 0.3s;}
.cl-progress-txt{font-size:11px;color:#888;margin-top:4px;margin-bottom:2px;}
.usterki-section{margin-top:14px;border-top:0.5px solid #eee;padding-top:12px;}
.usterki-title{font-size:12px;font-weight:500;color:#555;margin-bottom:8px;}
.usterka-item{display:flex;align-items:flex-start;gap:6px;padding:7px 9px;background:#FEF9E7;border:0.5px solid #F9E79F;border-radius:8px;margin-bottom:5px;}
.usterka-ts{font-size:11px;color:#888;margin-bottom:2px;}
.usterka-text{font-size:13px;color:#444;}
.usterka-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.usterka-edit{font-size:11px;padding:3px 8px;background:#EBF5FB;color:#1A5276;border:0.5px solid #AED6F1;border-radius:6px;cursor:pointer;}
.usterka-del{font-size:11px;padding:3px 8px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:6px;cursor:pointer;}
.usterka-item.nw{background:#FFF5F5;border-color:#F09595;}
.usterka-item.nw .usterka-text{color:#A32D2D;}
.usterka-photo{width:100%;border-radius:8px;margin-top:6px;max-height:200px;object-fit:cover;cursor:pointer;}
.usterki-textarea{width:100%;margin-top:6px;padding:9px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;color:#222;background:#FAFAFA;resize:vertical;font-family:inherit;}
.usterki-save-btn{width:100%;margin-top:6px;padding:10px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.photo-btn{width:100%;margin-top:6px;padding:10px;background:#EBF5FB;color:#1A5276;border:0.5px solid #AED6F1;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.photo-input{display:none;}
.done-row{margin-top:12px;display:flex;gap:8px;}
.done-badge{flex:1;text-align:center;background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;padding:11px;border-radius:10px;font-size:14px;font-weight:500;}
.undone-btn{padding:11px 14px;background:#FEF9E7;color:#7D6608;border:0.5px solid #F9E79F;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.done-btn{display:block;width:100%;margin-top:14px;padding:14px;background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;border-radius:10px;font-size:15px;font-weight:500;text-align:center;cursor:pointer;}
.done-btn:active{transform:scale(0.98);}
.nw-toggle{width:100%;margin-top:8px;padding:11px;background:#fff;color:#888;border:0.5px solid #ddd;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;}
.nw-body{display:none;margin-top:8px;}
.nw-body.open{display:block;}
.nw-textarea{width:100%;padding:9px;border:0.5px solid #F09595;border-radius:8px;font-size:13px;color:#222;background:#FFF5F5;resize:vertical;font-family:inherit;}
.nw-save{width:100%;margin-top:6px;padding:10px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.cal-month-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2980B9;}
.cal-month-name{font-size:18px;font-weight:500;}
.cal-month-count{background:#2980B9;color:#fff;font-size:12px;font-weight:500;padding:2px 10px;border-radius:20px;}
.cal-item{display:flex;align-items:stretch;gap:10px;margin-bottom:8px;background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:10px 12px;cursor:pointer;transition:background 0.15s;}
.cal-item:active{background:#EBF5FB;}
.cal-item.done{opacity:0.5;}
.cal-item-preseason{border-color:#82E0AA;}
.cal-date{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:44px;background:#F4F6F8;border-radius:8px;padding:6px 8px;text-align:center;}
.cal-date-green{background:#EAF3DE;}
.cal-day-name{font-size:10px;color:#888;font-weight:500;}
.cal-day-num{font-size:22px;font-weight:700;line-height:1.1;}
.cal-info{flex:1;min-width:0;}
.cal-prop{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.cal-cleaner{font-size:12px;color:#555;margin-bottom:4px;}
.cal-cleaner-green{color:#1E8449;}
.cal-badges{display:flex;gap:6px;flex-wrap:wrap;}
.cal-done-badge{background:#EAF3DE;color:#1E8449;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;}
.badge-preseason{background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;}
.ps-item{display:flex;align-items:center;gap:12px;background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:12px 14px;margin-bottom:10px;transition:box-shadow 0.3s;}
.ps-icon{font-size:22px;flex-shrink:0;}
.ps-info{flex:1;min-width:0;}
.ps-prop{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px;}
.ps-date{font-size:12px;color:#555;}
.ps-badge-yes{background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.ps-badge-no{background:#F4F6F8;color:#999;border:0.5px solid #ddd;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.ps-section-title{font-size:13px;font-weight:500;color:#888;margin:16px 0 8px 0;padding-bottom:6px;border-bottom:0.5px solid #eee;}
.timer-section{margin-top:12px;border-top:0.5px solid #eee;padding-top:12px;}
.timer-display{font-size:32px;font-weight:700;color:#2471A3;text-align:center;padding:10px 0;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.timer-btn-start{display:block;width:100%;padding:12px;background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:6px;}
.timer-btn-stop{display:block;width:100%;padding:12px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:6px;}
.timer-result{font-size:12px;color:#1E8449;text-align:center;margin-top:4px;font-weight:500;}
.report-login{background:#fff;border-radius:14px;padding:24px;margin-top:20px;text-align:center;}
.report-login-icon{font-size:40px;margin-bottom:12px;}
.report-login-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:16px;}
.report-pin-input{width:100%;padding:12px;border:0.5px solid #ddd;border-radius:10px;font-size:18px;text-align:center;letter-spacing:4px;color:#1a1a1a;background:#F4F6F8;margin-bottom:12px;}
.report-pin-btn{width:100%;padding:12px;background:#6C3483;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;}
.report-pin-error{color:#A32D2D;font-size:13px;margin-top:8px;}
.report-select-row{display:flex;gap:8px;margin-bottom:16px;}
.report-select{flex:1;padding:10px;border:0.5px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;}
.report-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.report-stat{background:#fff;border-radius:12px;padding:14px;text-align:center;border:0.5px solid #ddd;}
.report-stat-num{font-size:28px;font-weight:700;color:#2471A3;}
.report-stat-label{font-size:11px;color:#888;margin-top:4px;}
.report-section-title{font-size:14px;font-weight:500;color:#1a1a1a;margin:20px 0 10px 0;padding-bottom:6px;border-bottom:2px solid #2980B9;}
.report-worker-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border-radius:10px;margin-bottom:6px;border:0.5px solid #ddd;}
.report-worker-name{font-size:14px;font-weight:500;}
.report-worker-count{font-size:14px;font-weight:700;color:#2471A3;}
.report-property-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:0.5px solid #ddd;}
.report-property-name{font-size:15px;font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.report-property-count{font-size:12px;font-weight:500;background:#EBF5FB;color:#2471A3;padding:2px 10px;border-radius:20px;}
.report-cleaning-row{padding:6px 0;border-bottom:0.5px solid #f0f0f0;font-size:12px;color:#555;}
.report-cleaning-row:last-child{border-bottom:none;}
.report-cleaning-date{font-weight:500;color:#1a1a1a;}
.report-cleaning-extra{font-size:11px;color:#7D4900;margin-top:2px;}
.report-cleaning-note{font-size:11px;color:#444;margin-top:2px;font-style:italic;}
.report-usterka-item{padding:8px 10px;background:#FEF9E7;border:0.5px solid #F9E79F;border-radius:8px;margin-bottom:6px;}
.report-usterka-prop{font-size:11px;font-weight:500;color:#7D4900;margin-bottom:2px;}
.report-usterka-text{font-size:13px;color:#444;}
.report-usterka-ts{font-size:10px;color:#aaa;margin-top:2px;}
.report-usterka-photo{width:100%;border-radius:6px;margin-top:6px;max-height:150px;object-fit:cover;cursor:pointer;}
.report-ps-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#EAF3DE;border-radius:10px;margin-bottom:6px;border:0.5px solid #82E0AA;}
.report-ps-name{font-size:13px;font-weight:500;color:#1E8449;}
.report-ps-date{font-size:12px;color:#1E8449;}
/* Properties */
.prop-list-item{display:flex;align-items:center;gap:12px;background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background 0.15s;}
.prop-list-item:active{background:#EBF5FB;}
.prop-list-icon{font-size:28px;flex-shrink:0;}
.prop-list-info{flex:1;min-width:0;}
.prop-list-name{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:2px;}
.prop-list-owner{font-size:12px;color:#888;}
.prop-list-arrow{font-size:18px;color:#bbb;flex-shrink:0;}
.prop-detail-section{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:0.5px solid #ddd;}
.prop-detail-label{font-size:10px;font-weight:500;color:#888;letter-spacing:0.4px;margin-bottom:4px;}
.prop-detail-val{font-size:14px;color:#1a1a1a;line-height:1.5;}
.prop-detail-code{font-size:18px;font-weight:700;color:#2471A3;letter-spacing:2px;margin-top:4px;}
.prop-maps-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#EAF3DE;color:#1E8449;border:0.5px solid #82E0AA;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;text-decoration:none;}
.prop-section-title{font-size:13px;font-weight:500;color:#555;margin:16px 0 8px 0;padding-bottom:6px;border-bottom:0.5px solid #eee;}
.prop-uwaga-item{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;background:#FEF9E7;border:0.5px solid #F9E79F;border-radius:8px;margin-bottom:6px;}
.prop-uwaga-ts{font-size:11px;color:#888;margin-bottom:2px;}
.prop-uwaga-text{font-size:13px;color:#444;}
.prop-uwaga-del{font-size:11px;padding:3px 8px;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:6px;cursor:pointer;flex-shrink:0;}
.prop-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.prop-photo-item{position:relative;}
.prop-photo-img{width:100%;height:120px;object-fit:cover;border-radius:8px;cursor:pointer;}
.prop-photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.prop-add-uwaga-row{display:flex;gap:8px;margin-top:8px;}
.prop-add-uwaga-input{flex:1;padding:9px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;color:#222;background:#FAFAFA;font-family:inherit;}
.prop-add-uwaga-btn{padding:9px 14px;background:#2471A3;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.prop-add-photo-btn{width:100%;padding:10px;background:#EBF5FB;color:#1A5276;border:0.5px solid #AED6F1;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:28px;height:28px;border:3px solid rgba(41,128,185,0.2);border-top-color:#2980B9;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.header-refresh{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;margin-left:auto;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- Login -->
<div id="s-login" class="screen active">
  <div class="w">
    <div class="login-hero">
      <div class="login-icon">🧹</div>
      <div class="login-title">Moje Sprzątania</div>
      <div class="login-sub">Wybierz swoje imię</div>
    </div>
    <button class="cal-btn" onclick="showCalendar()">📅 Zobacz wszystkie sprzątania</button>
    <button class="cal-btn" onclick="showPreSeason()">🌱 Sprzątania przed sezonem</button>
    <button class="cal-btn cal-btn-props" onclick="showPropertiesLogin()">🏠 Wszystkie domki</button>
    <button class="cal-btn cal-btn-report" onclick="showReportLogin()">📊 Raport miesięczny</button>
    <div id="worker-list" class="worker-list"><div class="spinner"></div></div>
  </div>
</div>

<!-- Jobs -->
<div id="s-jobs" class="screen">
  <div class="header">
    <button class="header-back" onclick="showLogin()">←</button>
    <div>
      <div class="header-title" id="jobs-title">Moje sprzątania</div>
      <div class="header-sub" id="jobs-sub"></div>
    </div>
    <button class="header-refresh" onclick="forceRefresh()">↻</button>
  </div>
  <div class="w">
    <button class="cal-btn" onclick="showCalendar()">📅 Zobacz wszystkie sprzątania</button>
    <div id="jobs-content"></div>
  </div>
</div>

<!-- Calendar -->
<div id="s-calendar" class="screen">
  <div class="header">
    <button class="header-back" onclick="goBackFromCalendar()">←</button>
    <div>
      <div class="header-title">Kalendarz sprzątań</div>
      <div class="header-sub" id="cal-sub">Wszystkie zaplanowane</div>
    </div>
  </div>
  <div class="w"><div id="cal-content"></div></div>
</div>

<!-- Pre-season -->
<div id="s-preseason" class="screen">
  <div class="header">
    <button class="header-back" onclick="showLogin()">←</button>
    <div>
      <div class="header-title">Sprzątania przed sezonem</div>
      <div class="header-sub">Jednorazowe sprzątania startowe</div>
    </div>
  </div>

function lsGet(key){try{var v=localStorage.getItem(key);return v?JSON.parse(v):{};}catch(e){return{};}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

var MONTHS=['Stycznia','Lutego','Marca','Kwietnia','Maja','Czerwca','Lipca','Sierpnia','Września','Października','Listopada','Grudnia'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function show(id){document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function initials(n){var p=String(n).trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():String(n).substring(0,2).toUpperCase();}
function fmtDate(d){return DAY_LONG[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()];}
function fmtDateShort(d){return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function fmtDateFromKey(k){if(!k)return '';var p=k.split('-');var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function fmtTime(v){if(!v||v==='')return '';if(v instanceof Date){var h=v.getHours(),m=v.getMinutes();return(h<10?'0':'')+h+':'+(m<10?'0':'')+m;}var s=String(v).trim(),mt=s.match(/^(\d{1,2}):(\d{2})/);if(mt)return(mt[1].length<2?'0':'')+mt[1]+':'+mt[2];var n=Number(s);if(!isNaN(n)){if(n>=1)n=n-Math.floor(n);var t=Math.round(n*24*60),hh=Math.floor(t/60)%24,mm=t%60;return(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;}return s;}
function isToday(d){var t=new Date();t.setHours(0,0,0,0);var dd=new Date(d);dd.setHours(0,0,0,0);return dd.getTime()===t.getTime();}
function nowTs(){var ts=new Date();return String(ts.getDate()).padStart(2,'0')+'.'+(ts.getMonth()+1<10?'0':'')+(ts.getMonth()+1)+' '+String(ts.getHours()).padStart(2,'0')+':'+String(ts.getMinutes()).padStart(2,'0');}
function guestsStr(n){return n===1?'osoba':n<5?'osoby':'osób';}
function toast(msg,ms){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},ms||2200);}

function apiGet(params,cb){
  var url=API+'?'+params+'&_='+Date.now();
  if(window.fetch){
    fetch(url,{cache:'no-store'}).then(function(r){return r.text();}).then(function(text){
      var data;
      try{data=JSON.parse(text);}catch(e){var m=text.match(/^[^(]+\((.+)\)$/s);if(m)data=JSON.parse(m[1]);else throw e;}
      cb(null,data);
    }).catch(function(){jsonpGet(params,cb);});
  } else {jsonpGet(params,cb);}
}
function jsonpGet(params,cb){
  var n='cb_'+Date.now(),s=document.createElement('script'),done=false;
  window[n]=function(data){done=true;delete window[n];try{document.body.removeChild(s);}catch(e){}cb(null,data);};
  s.onerror=function(){if(done)return;done=true;delete window[n];cb(new Error('Błąd sieci'),null);};
  s.src=API+'?'+params+'&callback='+n+'&_='+Date.now();
  document.body.appendChild(s);
}
function apiAction(params,retries){
  retries=retries||0;
  var url=API+'?'+params+'&_='+Date.now();
  if(window.fetch){fetch(url,{cache:'no-store'}).catch(function(){if(retries<2)setTimeout(function(){apiAction(params,retries+1);},1500);});}
  else{var img=new Image();img.src=url;}
}

function loadData(cb){
  var attempts=0;
  function attempt(){
    attempts++;
    apiGet('action=spa_data',function(err,data){
      if(err){if(attempts<3){setTimeout(attempt,1000);}return;}
      try{
        state.workers=data.workers||[];
        state.allJobs=(data.jobs||[]).map(function(j){j.date=new Date(j.dateTs);return j;});
        state.preSeason=data.preSeason||[];
        state.properties=data.properties||[];
        state.loaded=true;
        mergeLocalState();
        if(cb)cb();
      }catch(e){if(attempts<3){setTimeout(attempt,1000);}}
    });
  }
  attempt();
}

function showJobs(w){

  pastJobs.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  var tj=jobs.filter(function(j){return isToday(j.date);});
  var uj=jobs.filter(function(j){return !isToday(j.date);});

  }
  document.getElementById('jobs-content').innerHTML=html;

function showCalendar(){

  var html='';

        return;
      }
      html+='<div class="cal-item'+(j.done?' done':'')+'" onclick="openJob(\''+esc(j.cleaner)+'\','+j.row+')">'

    });
    html+='</div>';
  });
  var pastJobs=state.allJobs.filter(function(j){var jd=new Date(j.date);jd.setHours(0,0,0,0);return jd<today;});
  pastJobs.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

// ── Timer ─────────────────────────────────────────────────────
var _jobTimers={};
function timerStart(row){
  if(_jobTimers[row]&&_jobTimers[row].running)return;
  var startTime=Date.now();
  _jobTimers[row]={running:true,startTime:startTime,interval:null};
  var btn=document.getElementById('tbtn-'+row);
  if(btn)btn.outerHTML='<button class="timer-btn-stop" id="tbtn-'+row+'" onclick="timerStop('+row+')">⏹ Kończę sprzątanie</button>';
  _jobTimers[row].interval=setInterval(function(){
    var elapsed=Math.floor((Date.now()-startTime)/1000);
    var h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
    var disp=document.getElementById('tdisp-'+row);
    if(disp)disp.textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  },1000);
}
function timerStop(row){
  if(!_jobTimers[row]||!_jobTimers[row].running)return;
  clearInterval(_jobTimers[row].interval);_jobTimers[row].running=false;
  var elapsed=Math.floor((Date.now()-_jobTimers[row].startTime)/1000);
  var h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
  var timeStr=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  var btn=document.getElementById('tbtn-'+row);
  if(btn)btn.outerHTML='<button class="timer-btn-start" id="tbtn-'+row+'" onclick="timerStart('+row+')">▶ Zaczynam sprzątanie</button>';
  var res=document.getElementById('tres-'+row);
  if(res)res.textContent='✓ Czas sprzątania: '+timeStr;
  apiAction('action=timer_save&row='+row+'&time='+encodeURIComponent(timeStr)+'&worker='+encodeURIComponent(state.currentWorker||''));
  toast('⏱️ Czas zapisany: '+timeStr);
}

    var base64=e.target.result.split(',')[1];

    formData.append('row',String(row));
    formData.append('worker',state.currentWorker||'');

      .then(function(r){return r.json();})

    +'<div id="ul-'+j.row+'">'+uHtml+'</div>'
    +'<textarea class="usterki-textarea" id="nt-'+j.row+'" rows="3" placeholder="Wpisz usterki, zniszczenia, braki..."></textarea>'
    +'<button class="usterki-save-btn" onclick="addU('+j.row+')">📌 Zapisz usterkę</button>'
    +'<input type="file" accept="image/*" capture="environment" class="photo-input" id="photo-'+j.row+'" onchange="uploadPhoto('+j.row+',this)">'
    +'<button class="photo-btn" onclick="document.getElementById(\'photo-'+j.row+'\').click()">📸 Dodaj zdjęcie usterki</button>'
    +'</div>'
    +timerHtml+dHtml+'</div>';
}

function buildUsterkiHtml(row,usterki){
  if(!usterki||!usterki.length)return '';
  return usterki.map(function(u){
    var isNW=u.text&&u.text.indexOf('[NIE WYKONANO]')===0;
    return '<div class="usterka-item'+(isNW?' nw':'')+'">'
      +'<div style="flex:1;"><div class="usterka-ts">'+esc(u.ts)+'</div>'
      +(u.photo?'<img class="usterka-photo" src="'+u.photo+'" onclick="window.open(\''+u.photo+'\',\'_blank\')">':'<div class="usterka-text">'+esc(u.text)+'</div>')
      +'</div>'
      +'<div class="usterka-btns"><button class="usterka-edit" onclick="editU(\''+esc(u.id)+'\','+row+')">edytuj</button>'
      +'<button class="usterka-del" onclick="delU(\''+esc(u.id)+'\','+row+')">usuń</button></div></div>';
  }).join('');
}

function toggleCL(id){var cl=document.getElementById(id+'-cl'),ar=document.getElementById(id+'-ar');var o=cl.classList.toggle('open');ar.textContent=o?'ukryj ▲':'pokaż ▶';}
function toggleNW(id){document.getElementById(id+'-nw').classList.toggle('open');}

var _clTimers={};
function toggleCheck(cbId,row){
  var cbEl=document.getElementById(cbId),lbEl=document.getElementById('lbl-'+cbId);
  if(lbEl)lbEl.classList.toggle('checked',cbEl.checked);
  var job=state.allJobs.find(function(j){return j.row===row;});
  if(!job)return;
  if(!job.checklist)job.checklist={};
  job.checklist[cbId]=cbEl.checked;
  var checked=0;Object.keys(job.checklist).forEach(function(k){if(job.checklist[k])checked++;});
  var pct=CL_TOTAL>0?Math.round(checked/CL_TOTAL*100):0;
  var fillEl=document.getElementById('pfill-'+row),pctEl=document.getElementById('ppct-'+row);
  if(fillEl)fillEl.style.width=pct+'%';
  if(pctEl)pctEl.textContent=checked+' / '+CL_TOTAL+' punktów ('+pct+'%)';
  lsSaveChecklist(row,job.checklist);
  clearTimeout(_clTimers[row]);
  _clTimers[row]=setTimeout(function(){apiAction('action=checklist_save&row='+row+'&data='+encodeURIComponent(JSON.stringify(job.checklist)));},1000);
}

function setDone(row,done){
  var job=state.allJobs.find(function(j){return j.row===row;});
  if(!job)return;
  job.done=done;lsSaveDone(row,done);
  apiAction('action='+(done?'done':'undone')+'&row='+row+'&worker='+encodeURIComponent(state.currentWorker||''));
  rerenderCard(job);
  toast(done?'✓ Zapisano jako gotowe':'↩ Cofnięto — sprzątanie nie gotowe');
}
function addU(row){
  var txt=document.getElementById('nt-'+row);
  if(!txt||!txt.value.trim()){alert('Wpisz usterkę przed zapisaniem.');return;}
  var val=txt.value.trim();txt.value='';
  var u={id:'loc-'+Date.now(),ts:nowTs(),text:val};
  var job=state.allJobs.find(function(j){return j.row===row;});
  if(job){if(!job.usterki)job.usterki=[];job.usterki.push(u);lsSaveUsterki(row,job.usterki);renderU(row,job.usterki);}
  apiAction('action=usterka_add&row='+row+'&notes='+encodeURIComponent(val)+'&worker='+encodeURIComponent(state.currentWorker||''));
  toast('📌 Usterka zapisana');
}
function delU(id,row){
  if(!confirm('Usunąć?'))return;
  var job=state.allJobs.find(function(j){return j.row===row;});
  if(job){job.usterki=(job.usterki||[]).filter(function(u){return u.id!==id;});lsSaveUsterki(row,job.usterki);renderU(row,job.usterki);}
  apiAction('action=usterka_delete&row='+row+'&id='+encodeURIComponent(id)+'&worker='+encodeURIComponent(state.currentWorker||''));
  toast('🗑 Usunięto');
}
function editU(id,row){
  var job=state.allJobs.find(function(j){return j.row===row;});
  var u=job&&(job.usterki||[]).find(function(u){return u.id===id;});
  var nv=prompt('Edytuj:',u?u.text:'');
  if(nv===null)return;nv=nv.trim();if(!nv){alert('Tekst nie może być pusty.');return;}
  if(u)u.text=nv;
  if(job){lsSaveUsterki(row,job.usterki);renderU(row,job.usterki);}
  apiAction('action=usterka_edit&row='+row+'&id='+encodeURIComponent(id)+'&notes='+encodeURIComponent(nv)+'&worker='+encodeURIComponent(state.currentWorker||''));
  toast('✏️ Zaktualizowano');
}
function renderU(row,usterki){var el=document.getElementById('ul-'+row);if(!el)return;el.innerHTML=buildUsterkiHtml(row,usterki||[]);}
function saveNW(row,cid){
  var txt=document.getElementById(cid+'-nwtxt');
  if(!txt||!txt.value.trim()){alert('Wpisz powód.');return;}
  var val='[NIE WYKONANO] '+txt.value.trim();txt.value='';
  document.getElementById(cid+'-nw').classList.remove('open');
  var u={id:'loc-'+Date.now(),ts:nowTs(),text:val};
  var job=state.allJobs.find(function(j){return j.row===row;});
  if(job){if(!job.usterki)job.usterki=[];job.usterki.push(u);lsSaveUsterki(row,job.usterki);renderU(row,job.usterki);}
  apiAction('action=usterka_add&row='+row+'&notes='+encodeURIComponent(val)+'&worker='+encodeURIComponent(state.currentWorker||''));
  toast('✗ Powód zapisany');
}
function rerenderCard(job){
  var cid='c'+job.row,cardEl=document.getElementById(cid);
  if(!cardEl)return;
  var tmp=document.createElement('div');tmp.innerHTML=buildCard(job);
  cardEl.parentNode.replaceChild(tmp.firstChild,cardEl);
}
function forceRefresh(){
  state.loaded=false;
  loadData(function(){if(state.currentWorker)showJobs(state.currentWorker);else showCalendar();toast('✅ Odświeżono');});
}

function init(){loadData(function(){if(state.workers.length)renderLogin();});}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
window.addEventListener('load',function(){init();});
</script>
</body>
</html>
